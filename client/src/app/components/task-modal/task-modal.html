@if (task(); as t) {
  <div class="modal-backdrop" (click)="onBackdropClick()">
    <div class="modal-content glass-panel" (click)="stopPropagation($event)">
      <div class="modal-header">
        <input
          type="text"
          class="task-title-input"
          [ngModel]="t.title"
          (ngModelChange)="onTitleChange($event)"
          placeholder="Task title"
        />
        <button class="close-btn" (click)="close()" aria-label="Close">×</button>
      </div>

      <div class="modal-body">
        <div class="meta-grid">
          <div class="meta-item">
            <label>Status</label>
            <select
              [ngModel]="t.isCompleted"
              (ngModelChange)="onStatusChange($event)"
            >
              <option [ngValue]="false">In progress</option>
              <option [ngValue]="true">Completed</option>
            </select>
          </div>
          <div class="meta-item">
            <label>Priority</label>
            <select
              [ngModel]="t.priority"
              (ngModelChange)="onPriorityChange($event)"
            >
              @for (p of priorities; track p) {
                <option [value]="p">{{ p }}</option>
              }
            </select>
          </div>
          <div class="meta-item">
            <label>Due</label>
            <input
              type="datetime-local"
              [ngModel]="dueAtInputValue()"
              (ngModelChange)="onDueAtChange($event)"
            />
          </div>
        </div>

        <div class="section">
          <div class="description-header">
            <label class="section-label">Description</label>
            <button class="preview-toggle" (click)="togglePreview()">
              {{ isPreview() ? '✏️ Edit' : '👁️ Preview' }}
            </button>
          </div>
          @if (isPreview()) {
            <div class="markdown-preview" [innerHTML]="t.description | markdown"></div>
          } @else {
            <textarea
              [ngModel]="t.description"
              (ngModelChange)="onDescriptionChange($event)"
              placeholder="Write your description in **markdown**..."
              rows="5"
            ></textarea>
          }
        </div>

        <div class="section">
          <label class="section-label">Tags</label>
          @if (availableTags().length === 0) {
            <div class="empty-tags">No tags yet — create tags via the AI chat or backend.</div>
          } @else {
            <div class="tag-list">
              @for (tag of availableTags(); track tag.id) {
                <label class="tag-toggle" [style.--tag-color]="tag.color">
                  <input
                    type="checkbox"
                    [checked]="isTagOn(tag.id)"
                    (change)="toggleTag(tag.id, $any($event.target).checked)"
                  />
                  <span class="tag-label">{{ tag.label }}</span>
                </label>
              }
            </div>
          }
        </div>
      </div>

      <div class="modal-footer">
        <button class="primary-btn" (click)="close()">Done</button>
      </div>
    </div>
  </div>
}
