<nav class="nav-list">
  @for (item of navItems; track item.route) {
    <button
      class="nav-link"
      [class.active]="activeRoute() === item.route"
      (click)="setActive(item.route)"
    >
      <span class="icon">{{ item.icon }}</span>
      <span class="label">{{ item.label }}</span>
    </button>
  }
</nav>
