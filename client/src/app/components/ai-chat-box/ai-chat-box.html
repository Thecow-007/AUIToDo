<div class="chat-container">
  <div class="chat-header">
    <span class="chat-title">✨ AI Assistant</span>
  </div>

  <div class="message-history">
    <div class="message ai-message">
      <div class="avatar ai-avatar">✨</div>
      <div class="message-body">
        <div class="content">Hello! How can I help you manage your tasks today? I noticed "Clean Garage" is due tomorrow.</div>
        <span class="timestamp">12:01 PM</span>
      </div>
    </div>
    <div class="message user-message">
      <div class="message-body">
        <div class="content">Can you push the due date to this weekend?</div>
        <span class="timestamp">12:02 PM</span>
      </div>
      <div class="avatar user-avatar">U</div>
    </div>
    <div class="message ai-message">
      <div class="avatar ai-avatar">✨</div>
      <div class="message-body">
        <div class="content">Done! I've moved "Clean Garage" to Saturday at 10:00 AM. Want me to adjust any sub-tasks too?</div>
        <span class="timestamp">12:02 PM</span>
      </div>
    </div>
  </div>
  
  <div class="chat-input-area">
    <button class="voice-toggle" title="Voice Input">🎤</button>
    <input type="text" placeholder="Ask AI to manage tasks..." />
    <button class="send-btn">Send</button>
  </div>
</div>
